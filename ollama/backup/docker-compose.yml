services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:ollama
    container_name: open-webui-compose
    restart: always
    ports:
      - "8080:8080"
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - open-webui:/app/backend/data
      - open-webui-ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  open-webui:
  open-webui-ollama:
