services:
  vllm-server:
    image: nvcr.io/nvidia/vllm:26.01-py3
    container_name: vllm
    restart: "no"

    expose:
      - "8000"

    shm_size: "16g"

    stop_grace_period: 2m

    ulimits:
      memlock: -1
      stack: 67108864

    mem_limit: "60g"
    memswap_limit: "70g"

    gpus: all

    volumes:
      - ../../models/Ministral-3-3B-Instruct-2512:/models/Ministral-3-3B-Instruct-2512:ro

    environment:
      - VLLM_API_KEY=${VLLM_API_KEY}

    # Source: https://huggingface.co/mistralai/Ministral-3-3B-Instruct-2512
    # --tokenizer_mode/--config_format/--load_format mistral: required to use
    #   Mistral's native weight format. Without these, vLLM falls back to the
    #   HuggingFace loader which misidentifies this model as a Pixtral vision
    #   model (PixtralForConditionalGeneration), causing startup to crash.
    # --enable-auto-tool-choice / --tool-call-parser mistral: required for
    #   function/tool calling support.
    # --max-model-len: default is 262144 (very large); reduced here to limit
    #   KV-cache memory usage.
    command: >
      vllm serve /models/Ministral-3-3B-Instruct-2512
      --host 0.0.0.0
      --port 8000
      --async-scheduling
      --tokenizer_mode mistral
      --config_format mistral
      --load_format mistral
      --enable-auto-tool-choice
      --tool-call-parser mistral
      --gpu-memory-utilization 0.70
      --max-model-len 32768
      --max-num-batched-tokens 2048
      --max-num-seqs 32
      --swap-space 8

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      start_period: 10m
      retries: 60

    networks:
      - internal

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    depends_on:
      vllm-server:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    mem_limit: "512m"
    memswap_limit: "512m"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
