services:
  vllm-server:
    image: nvcr.io/nvidia/vllm:26.01-py3
    container_name: vllm
    tty: true
    stdin_open: true

    expose:
      - "8000"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Mount the host model directory into the container
    volumes:
      - ../models/gpt-oss-20b:/models/gpt-oss-20b:ro

    # Start OpenAI-compatible server, serving from the LOCAL path
    command: >
      vllm serve /models/gpt-oss-20b
      --host 0.0.0.0
      --port 8000
      --api-key ${VLLM_API_KEY}

    networks:
      - internal

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      # - "443:443/udp"  # optional for HTTP/3

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:

